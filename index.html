<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Family Hub"/>
<link rel="manifest" href="manifest.json"/>
<link rel="apple-touch-icon" href="icon.png"/>
<title>Family Hub</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{background:#0a0a0f;font-family:-apple-system,'SF Pro Display',sans-serif;color:#e2e8f0;overscroll-behavior:none;}
textarea,input{font-family:inherit;color:#e2e8f0;}
textarea:focus,input:focus{outline:none;}
::-webkit-scrollbar{display:none;}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState, useReducer, useRef} = React;

const FAMILY = ["Me","Partner","Kid"];
const DAYS = ["Monday","Tuesday","Wednesday","Thursday","Friday","Saturday","Sunday"];
const STAR="★", EMPTYSTAR="☆";
const TODAY = new Date().toISOString().split("T")[0];
const WEEK_DATES = Array.from({length:7},(_,i)=>{
  const d=new Date(); d.setDate(d.getDate()-d.getDay()+1+i);
  return d.toISOString().split("T")[0];
});

const T={
  bg:"#0a0a0f", surface:"#13131a", surface2:"#1c1c26", surface3:"#22222f",
  border:"#2a2a38", accent:"#e2e8f0", gold:"#c9a84c", green:"#4a9e7a",
  red:"#c0504a", text:"#e2e8f0", textSoft:"#94a3b8", textDim:"#4a4a6a",
};

const DEFAULT_GOALS={Me:2000,Partner:1800,Kid:1600};

const DEFAULT_RECIPES={
  "Spaghetti Bolognese":{ingredients:["spaghetti","ground beef","tomato sauce","onion","garlic"],notes:"Classic family fave",calories:650,ratings:{Me:5,Partner:4}},
  "Tacos":{ingredients:["taco shells","ground beef","salsa","cheese","lettuce"],notes:"",calories:480,ratings:{Me:5,Partner:5}},
  "Chicken Stir Fry":{ingredients:["chicken breast","broccoli","soy sauce","bell pepper","rice"],notes:"Quick weeknight meal",calories:420,ratings:{Me:4,Partner:3}},
  "Pizza Night":{ingredients:["pizza dough","tomato sauce","mozzarella","toppings"],notes:"Everyone picks toppings!",calories:700,ratings:{Me:5,Kid:5}},
  "BBQ Burgers":{ingredients:["burger patties","buns","lettuce","tomato","cheese"],notes:"",calories:580,ratings:{}},
  "Roast Chicken":{ingredients:["whole chicken","potatoes","carrots","rosemary","garlic"],notes:"Sunday tradition",calories:520,ratings:{Partner:5}},
};

const DEFAULT_MEALS={
  Monday:{lunch:"",dinner:"Spaghetti Bolognese"},
  Tuesday:{lunch:"",dinner:"Tacos"},
  Wednesday:{lunch:"Caesar Salad",dinner:""},
  Thursday:{lunch:"",dinner:"Chicken Stir Fry"},
  Friday:{lunch:"",dinner:"Pizza Night"},
  Saturday:{lunch:"Sandwiches",dinner:"BBQ Burgers"},
  Sunday:{lunch:"",dinner:"Roast Chicken"},
};

function loadState(){
  try{const s=localStorage.getItem("fh_v4");if(s)return JSON.parse(s);}catch(e){}
  return{tab:"planner",profile:"Me",meals:DEFAULT_MEALS,recipes:DEFAULT_RECIPES,shopping:[],calorieLog:{},goals:DEFAULT_GOALS};
}
function persist(st){try{localStorage.setItem("fh_v4",JSON.stringify(st));}catch(e){}}

function reducer(state,action){
  let n=state;
  switch(action.type){
    case"TAB":n={...state,tab:action.v};break;
    case"PROFILE":n={...state,profile:action.v};break;
    case"SET_MEAL":n={...state,meals:{...state.meals,[action.day]:{...state.meals[action.day],[action.slot]:action.v}}};break;
    case"SET_INGREDIENTS":{const r=state.recipes[action.meal]||{notes:"",calories:0,ratings:{}};n={...state,recipes:{...state.recipes,[action.meal]:{...r,ingredients:action.v}}};break;}
    case"SET_NOTE":{const r=state.recipes[action.meal]||{ingredients:[],calories:0,ratings:{}};n={...state,recipes:{...state.recipes,[action.meal]:{...r,notes:action.v}}};break;}
    case"SET_CAL":{const r=state.recipes[action.meal]||{ingredients:[],notes:"",ratings:{}};n={...state,recipes:{...state.recipes,[action.meal]:{...r,calories:action.v}}};break;}
    case"RATE":{const r=state.recipes[action.meal]||{ingredients:[],notes:"",calories:0,ratings:{}};n={...state,recipes:{...state.recipes,[action.meal]:{...r,ratings:{...r.ratings,[action.profile]:action.v}}}};break;}
    case"ADD_RECIPE":n={...state,recipes:{...state.recipes,[action.name]:{ingredients:action.ingredients||[],notes:action.notes||"",calories:action.calories||0,ratings:{}}}};break;
    case"GEN_SHOPPING":{
      const seen={},items=[];
      DAYS.forEach(d=>["lunch","dinner"].forEach(slot=>{
        const m=state.meals[d][slot];
        if(m&&state.recipes[m])state.recipes[m].ingredients.forEach(i=>{if(!seen[i]){seen[i]=true;items.push({id:items.length,name:i,checked:false});}});
      }));
      n={...state,shopping:items,tab:"shopping"};break;
    }
    case"TOGGLE_SHOP":n={...state,shopping:state.shopping.map(i=>i.id===action.id?{...i,checked:!i.checked}:i)};break;
    case"LOG_CALORIES":{
      const{date,profile,entry}=action;
      const day=state.calorieLog[date]||{};
      const list=day[profile]||[];
      n={...state,calorieLog:{...state.calorieLog,[date]:{...day,[profile]:[...list,{...entry,id:Date.now()}]}}};break;
    }
    case"DEL_LOG":{
      const{date,profile,id}=action;
      const day=state.calorieLog[date]||{};
      const list=(day[profile]||[]).filter(e=>e.id!==id);
      n={...state,calorieLog:{...state.calorieLog,[date]:{...day,[profile]:list}}};break;
    }
    case"SET_GOAL":n={...state,goals:{...state.goals,[action.profile]:action.v}};break;
    default:return state;
  }
  persist(n);return n;
}

function dayTotal(log,date,profile){return((log[date]||{})[profile]||[]).reduce((s,e)=>s+e.calories,0);}
function weekTotal(log,profile){return WEEK_DATES.reduce((s,d)=>s+dayTotal(log,d,profile),0);}
function fmtDate(d){return new Date(d+"T12:00:00").toLocaleDateString("en-US",{weekday:"short",month:"short",day:"numeric"});}

const Card=({children,style={}})=><div style={{background:T.surface,borderRadius:16,padding:16,marginBottom:12,border:`1px solid ${T.border}`,...style}}>{children}</div>;
const Label=({children})=><div style={{fontSize:11,fontWeight:700,color:T.textDim,letterSpacing:1.4,textTransform:"uppercase",marginBottom:8}}>{children}</div>;
const Divider=()=><div style={{height:1,background:T.border,margin:"12px 0"}}/>;

function Ring({pct,size=72,stroke=6,color=T.green,children}){
  const r=size/2-stroke,c=2*Math.PI*r;
  return(
    <div style={{position:"relative",width:size,height:size,flexShrink:0}}>
      <svg width={size} height={size} style={{transform:"rotate(-90deg)"}}>
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={T.border} strokeWidth={stroke}/>
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth={stroke}
          strokeDasharray={c} strokeDashoffset={c-(c*Math.min(pct,1))} strokeLinecap="round"/>
      </svg>
      <div style={{position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"center"}}>{children}</div>
    </div>
  );
}

function StarRating({value,onChange,readonly,size=15}){
  return <span style={{cursor:readonly?"default":"pointer",color:T.gold,fontSize:size,letterSpacing:1}}>
    {[1,2,3,4,5].map(s=><span key={s} onClick={()=>!readonly&&onChange(s)}>{s<=(value||0)?STAR:EMPTYSTAR}</span>)}
  </span>;
}

function PhotoEstimator({onLog,profile}){
  const [img,setImg]=useState(null);
  const [imgData,setImgData]=useState(null);
  const [loading,setLoading]=useState(false);
  const [result,setResult]=useState(null);
  const [error,setError]=useState(null);
  const [editCal,setEditCal]=useState("");
  const fileRef=useRef();

  const handleFile=e=>{
    const f=e.target.files[0];if(!f)return;
    setResult(null);setError(null);setEditCal("");
    const reader=new FileReader();
    reader.onload=ev=>{setImg(ev.target.result);setImgData(ev.target.result.split(",")[1]);};
    reader.readAsDataURL(f);
  };

  const analyze=async()=>{
    if(!imgData)return;
    setLoading(true);setError(null);setResult(null);
    try{
      const res=await fetch("https://api.anthropic.com/v1/messages",{
        method:"POST",headers:{"Content-Type":"application/json"},
        body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:500,
          messages:[{role:"user",content:[
            {type:"image",source:{type:"base64",media_type:"image/jpeg",data:imgData}},
            {type:"text",text:`Analyze this food photo and estimate calories. Return ONLY raw JSON, no markdown: {"name":"meal name","calories":number,"breakdown":[{"item":"food item","calories":number}],"confidence":"low|medium|high","notes":"brief note"}`}
          ]}]})
      });
      const data=await res.json();
      const text=data.content.map(b=>b.text||"").join("");
      const parsed=JSON.parse(text.replace(/```json|```/g,"").trim());
      setResult(parsed);setEditCal(String(parsed.calories));
    }catch(e){setError("Couldn't analyze this photo. Try a clearer image.");}
    setLoading(false);
  };

  const handleLog=()=>{
    const cal=parseInt(editCal)||0;
    onLog({name:result.name,calories:cal,img,time:new Date().toLocaleTimeString("en-US",{hour:"2-digit",minute:"2-digit"})});
    setImg(null);setImgData(null);setResult(null);setEditCal("");
    if(fileRef.current)fileRef.current.value="";
  };

  const confColor={low:T.red,medium:T.gold,high:T.green};
  return(
    <Card style={{border:`1px dashed ${T.border}`}}>
      <Label>📷 Log Meal from Photo</Label>
      <input ref={fileRef} type="file" accept="image/*" onChange={handleFile} style={{display:"none"}}/>
      <button onClick={()=>fileRef.current.click()} style={{background:T.surface2,color:T.textSoft,border:`1px solid ${T.border}`,borderRadius:10,padding:"10px 0",fontWeight:600,cursor:"pointer",fontSize:13,width:"100%"}}>
        {img?"Change Photo":"Choose Photo"}
      </button>
      {img&&(
        <div style={{marginTop:12}}>
          <img src={img} alt="meal" style={{width:"100%",borderRadius:10,marginBottom:10,maxHeight:200,objectFit:"cover"}}/>
          {!result&&<button onClick={analyze} disabled={loading} style={{background:T.accent,color:T.bg,border:"none",borderRadius:10,padding:"10px 0",fontWeight:700,cursor:loading?"default":"pointer",opacity:loading?0.6:1,width:"100%",fontSize:14}}>
            {loading?"Analyzing…":"✨ Estimate Calories"}
          </button>}
        </div>
      )}
      {error&&<div style={{color:T.red,fontSize:13,marginTop:8}}>{error}</div>}
      {result&&(
        <div style={{marginTop:12,background:T.surface2,borderRadius:12,padding:14}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:10}}>
            <div style={{fontWeight:700,fontSize:16,color:T.text,flex:1,marginRight:10}}>{result.name}</div>
            <span style={{fontSize:11,fontWeight:700,color:confColor[result.confidence]||T.gold,background:T.surface3,borderRadius:8,padding:"3px 8px"}}>{result.confidence} confidence</span>
          </div>
          {(result.breakdown||[]).length>0&&(
            <div style={{marginBottom:10}}>
              {result.breakdown.map((b,i)=>(
                <div key={i} style={{display:"flex",justifyContent:"space-between",fontSize:12,color:T.textSoft,padding:"4px 0",borderBottom:`1px solid ${T.border}`}}>
                  <span>{b.item}</span><span style={{color:T.gold}}>{b.calories} cal</span>
                </div>
              ))}
            </div>
          )}
          {result.notes&&<div style={{fontSize:12,color:T.textDim,fontStyle:"italic",marginBottom:10}}>{result.notes}</div>}
          <div style={{marginBottom:12}}>
            <Label>Adjust Calories</Label>
            <div style={{display:"flex",gap:8,alignItems:"center"}}>
              <input type="number" value={editCal} onChange={e=>setEditCal(e.target.value)}
                style={{flex:1,background:T.surface3,border:`1px solid ${T.border}`,borderRadius:8,padding:"8px 12px",fontSize:18,fontWeight:700,color:T.accent,textAlign:"center"}}/>
              <span style={{color:T.textDim,fontSize:13}}>cal</span>
            </div>
          </div>
          <button onClick={handleLog} style={{background:T.green,color:"#fff",border:"none",borderRadius:10,padding:"11px 0",fontWeight:700,cursor:"pointer",width:"100%",fontSize:14}}>
            + Log for {profile}
          </button>
        </div>
      )}
    </Card>
  );
}

function RecipeImport({onSave}){
  const [img,setImg]=useState(null);
  const [imgData,setImgData]=useState(null);
  const [loading,setLoading]=useState(false);
  const [result,setResult]=useState(null);
  const [error,setError]=useState(null);
  const fileRef=useRef();

  const handleFile=e=>{
    const f=e.target.files[0];if(!f)return;
    setResult(null);setError(null);
    const reader=new FileReader();
    reader.onload=ev=>{setImg(ev.target.result);setImgData(ev.target.result.split(",")[1]);};
    reader.readAsDataURL(f);
  };

  const analyze=async()=>{
    if(!imgData)return;
    setLoading(true);setError(null);setResult(null);
    try{
      const res=await fetch("https://api.anthropic.com/v1/messages",{
        method:"POST",headers:{"Content-Type":"application/json"},
        body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:800,
          messages:[{role:"user",content:[
            {type:"image",source:{type:"base64",media_type:"image/jpeg",data:imgData}},
            {type:"text",text:`Extract the recipe and estimate calories per serving. Return ONLY raw JSON, no markdown: {"name":"recipe name","ingredients":["item1","item2"],"notes":"brief cooking notes","calories":number}`}
          ]}]})
      });
      const data=await res.json();
      const text=data.content.map(b=>b.text||"").join("");
      setResult(JSON.parse(text.replace(/```json|```/g,"").trim()));
    }catch(e){setError("Couldn't read this image. Try a clearer photo.");}
    setLoading(false);
  };

  return(
    <Card style={{border:`1px dashed ${T.border}`,marginBottom:12}}>
      <Label>📷 Import Recipe from Photo</Label>
      <input ref={fileRef} type="file" accept="image/*" onChange={handleFile} style={{display:"none"}}/>
      <button onClick={()=>fileRef.current.click()} style={{background:T.surface2,color:T.textSoft,border:`1px solid ${T.border}`,borderRadius:10,padding:"9px 0",fontWeight:600,cursor:"pointer",fontSize:13,width:"100%"}}>Choose Photo</button>
      {img&&(
        <div style={{marginTop:12}}>
          <img src={img} alt="recipe" style={{width:"100%",borderRadius:10,marginBottom:10,maxHeight:160,objectFit:"cover",opacity:0.85}}/>
          {!result&&<button onClick={analyze} disabled={loading} style={{background:T.accent,color:T.bg,border:"none",borderRadius:10,padding:"9px 0",fontWeight:700,cursor:loading?"default":"pointer",opacity:loading?0.6:1,width:"100%",fontSize:13}}>
            {loading?"Reading…":"✨ Extract Recipe"}
          </button>}
        </div>
      )}
      {error&&<div style={{color:T.red,fontSize:13,marginTop:8}}>{error}</div>}
      {result&&(
        <div style={{marginTop:12,background:T.surface2,borderRadius:10,padding:14}}>
          <div style={{fontWeight:700,fontSize:15,color:T.text,marginBottom:4}}>{result.name}</div>
          <div style={{fontSize:12,color:T.gold,marginBottom:6}}>~{result.calories} cal/serving</div>
          <div style={{fontSize:12,color:T.textSoft,marginBottom:10,lineHeight:1.6}}>{(result.ingredients||[]).join(", ")}</div>
          {result.notes&&<div style={{fontSize:12,color:T.textDim,fontStyle:"italic",marginBottom:10}}>{result.notes}</div>}
          <button onClick={()=>{onSave(result);setResult(null);setImg(null);setImgData(null);if(fileRef.current)fileRef.current.value="";}}
            style={{background:T.green,color:"#fff",border:"none",borderRadius:10,padding:"9px 0",fontWeight:700,cursor:"pointer",width:"100%",fontSize:13}}>
            Save to Recipes
          </button>
        </div>
      )}
    </Card>
  );
}

function App(){
  const [s,dispatch]=useReducer(reducer,null,loadState);
  const [editCell,setEditCell]=useState(null);
  const [openRecipe,setOpenRecipe]=useState(null);
  const [newName,setNewName]=useState("");
  const [trackDate,setTrackDate]=useState(TODAY);
  const [showGoalEdit,setShowGoalEdit]=useState(false);
  const [goalInput,setGoalInput]=useState(String(DEFAULT_GOALS[s.profile]));

  const goal=s.goals[s.profile]||2000;
  const todayTotal=dayTotal(s.calorieLog,trackDate,s.profile);
  const pct=todayTotal/goal;
  const ringColor=pct>=1?T.red:pct>0.8?T.gold:T.green;

  const avgRating=meal=>{
    const vals=Object.values(s.recipes[meal]?.ratings||{});
    return vals.length?(vals.reduce((a,b)=>a+b,0)/vals.length).toFixed(1):null;
  };

  const inp={width:"100%",background:T.surface2,border:`1px solid ${T.border}`,borderRadius:10,padding:"10px 12px",fontSize:14,color:T.text,boxSizing:"border-box"};
  const TABS=[["planner","📅","Plan"],["recipes","🍽","Recipes"],["calories","🔥","Calories"],["shopping","🛒","Shop"]];

  return(
    <div style={{minHeight:"100vh",background:T.bg,color:T.text,maxWidth:430,margin:"0 auto",paddingBottom:90}}>
      <div style={{height:"env(safe-area-inset-top,44px)",background:T.surface}}/>
      <div style={{background:T.surface,borderBottom:`1px solid ${T.border}`,padding:"14px 20px 14px",position:"sticky",top:0,zIndex:50}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div>
            <div style={{fontSize:20,fontWeight:800,letterSpacing:-0.5}}>Family Hub</div>
            <div style={{fontSize:11,color:T.textDim}}>Meals · Recipes · Calories</div>
          </div>
          <div style={{display:"flex",gap:5}}>
            {FAMILY.map(m=>(
              <button key={m} onClick={()=>{dispatch({type:"PROFILE",v:m});setGoalInput(String(s.goals[m]||2000));}}
                style={{padding:"5px 10px",borderRadius:20,border:`1px solid ${s.profile===m?T.accent:T.border}`,background:s.profile===m?T.accent:"transparent",color:s.profile===m?T.bg:T.textSoft,fontWeight:700,fontSize:11,cursor:"pointer"}}>
                {m}
              </button>
            ))}
          </div>
        </div>
      </div>

      <div style={{padding:"14px 14px 0"}}>

        {s.tab==="planner"&&(
          <div>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
              <Label>This Week</Label>
              <button onClick={()=>dispatch({type:"GEN_SHOPPING"})} style={{background:"transparent",border:`1px solid ${T.border}`,color:T.textSoft,borderRadius:10,padding:"5px 12px",fontSize:12,fontWeight:600,cursor:"pointer"}}>🛒 Shopping List</button>
            </div>
            {DAYS.map((day,di)=>(
              <Card key={day}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
                  <div style={{fontWeight:700,fontSize:14}}>{day}</div>
                  <div style={{fontSize:11,color:T.textDim}}>{fmtDate(WEEK_DATES[di])}</div>
                </div>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
                  {["lunch","dinner"].map(slot=>{
                    const val=s.meals[day][slot];
                    const isEdit=editCell?.day===day&&editCell?.slot===slot;
                    const cal=val&&s.recipes[val]?s.recipes[val].calories:null;
                    return(
                      <div key={slot} style={{background:T.surface2,borderRadius:10,padding:10,minHeight:62}}>
                        <div style={{fontSize:10,color:T.textDim,fontWeight:700,letterSpacing:1,textTransform:"uppercase",marginBottom:5}}>{slot}</div>
                        {isEdit?(
                          <input autoFocus value={val||""} onChange={e=>dispatch({type:"SET_MEAL",day,slot,v:e.target.value})}
                            onBlur={()=>setEditCell(null)} style={{...inp,padding:"4px 8px",fontSize:13,borderRadius:8}}/>
                        ):(
                          <div onClick={()=>setEditCell({day,slot})} style={{fontSize:13,color:val?T.text:T.textDim,cursor:"pointer",lineHeight:1.4}}>
                            {val||<span style={{fontStyle:"italic"}}>+ Add</span>}
                          </div>
                        )}
                        {cal&&<div style={{fontSize:11,color:T.gold,marginTop:4}}>{cal} cal</div>}
                      </div>
                    );
                  })}
                </div>
              </Card>
            ))}
          </div>
        )}

        {s.tab==="recipes"&&(
          <div>
            <RecipeImport onSave={r=>dispatch({type:"ADD_RECIPE",name:r.name,ingredients:r.ingredients,notes:r.notes,calories:r.calories})}/>
            <div style={{display:"flex",gap:8,marginBottom:12}}>
              <input placeholder="New recipe name…" value={newName} onChange={e=>setNewName(e.target.value)} style={{...inp,flex:1}}/>
              <button onClick={()=>{if(newName.trim()){dispatch({type:"ADD_RECIPE",name:newName.trim()});setOpenRecipe(newName.trim());setNewName("");}}}
                style={{background:T.accent,color:T.bg,border:"none",borderRadius:10,padding:"0 16px",fontWeight:700,cursor:"pointer",fontSize:13,whiteSpace:"nowrap"}}>Add</button>
            </div>
            {Object.keys(s.recipes).map(meal=>{
              const rec=s.recipes[meal];const open=openRecipe===meal;const avg=avgRating(meal);
              return(
                <Card key={meal}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",cursor:"pointer"}} onClick={()=>setOpenRecipe(open?null:meal)}>
                    <div style={{flex:1}}>
                      <div style={{fontWeight:600,fontSize:15}}>{meal}</div>
                      <div style={{display:"flex",gap:12,marginTop:3}}>
                        {rec.calories>0&&<span style={{fontSize:12,color:T.gold}}>{rec.calories} cal/serving</span>}
                        {avg&&<span style={{fontSize:12,color:T.textDim}}>★ {avg}</span>}
                      </div>
                    </div>
                    <span style={{color:T.textDim,fontSize:16,marginLeft:8}}>{open?"▲":"▼"}</span>
                  </div>
                  {open&&(
                    <div style={{marginTop:14}}>
                      <Divider/>
                      <Label>Calories per Serving</Label>
                      <input type="number" value={rec.calories||""} onChange={e=>dispatch({type:"SET_CAL",meal,v:parseInt(e.target.value)||0})} placeholder="e.g. 520" style={{...inp,marginBottom:10}}/>
                      <Label>Ingredients</Label>
                      <textarea value={(rec.ingredients||[]).join(", ")} onChange={e=>dispatch({type:"SET_INGREDIENTS",meal,v:e.target.value.split(",").map(x=>x.trim()).filter(Boolean)})} placeholder="Comma-separated…" style={{...inp,minHeight:56,resize:"vertical",marginBottom:10}}/>
                      <Label>Notes</Label>
                      <textarea value={rec.notes||""} onChange={e=>dispatch({type:"SET_NOTE",meal,v:e.target.value})} placeholder="Tips, variations…" style={{...inp,minHeight:44,resize:"vertical",marginBottom:10}}/>
                      <Label>My Rating ({s.profile})</Label>
                      <StarRating value={rec.ratings[s.profile]||0} onChange={v=>dispatch({type:"RATE",meal,profile:s.profile,v})} size={22}/>
                      {Object.entries(rec.ratings).filter(([p])=>p!==s.profile).map(([p,r])=>(
                        <div key={p} style={{fontSize:12,color:T.textDim,marginTop:6}}>{p}: {"★".repeat(r)}{"☆".repeat(5-r)}</div>
                      ))}
                    </div>
                  )}
                </Card>
              );
            })}
          </div>
        )}

        {s.tab==="calories"&&(
          <div>
            <Card>
              <div style={{display:"flex",gap:16,alignItems:"center"}}>
                <Ring pct={pct} size={80} stroke={7} color={ringColor}>
                  <div style={{textAlign:"center"}}>
                    <div style={{fontSize:13,fontWeight:800,color:ringColor}}>{Math.round(pct*100)}%</div>
                  </div>
                </Ring>
                <div style={{flex:1}}>
                  <div style={{fontSize:22,fontWeight:800}}>{todayTotal} <span style={{fontSize:13,color:T.textDim,fontWeight:400}}>/ {goal} cal</span></div>
                  <div style={{fontSize:13,color:pct>=1?T.red:T.textSoft,marginTop:2}}>
                    {pct>=1?`${todayTotal-goal} over goal`:`${goal-todayTotal} remaining`}
                  </div>
                  <div style={{marginTop:6}}>
                    <input type="date" value={trackDate} onChange={e=>setTrackDate(e.target.value)}
                      style={{background:"transparent",border:"none",color:T.textDim,fontSize:12,cursor:"pointer"}}/>
                  </div>
                </div>
                <button onClick={()=>setShowGoalEdit(!showGoalEdit)} style={{background:T.surface2,border:`1px solid ${T.border}`,color:T.textSoft,borderRadius:10,padding:"6px 10px",fontSize:11,fontWeight:600,cursor:"pointer"}}>Goal</button>
              </div>
              {showGoalEdit&&(
                <div style={{marginTop:12,display:"flex",gap:8}}>
                  <input type="number" value={goalInput} onChange={e=>setGoalInput(e.target.value)} style={{...inp,flex:1}} placeholder="Daily calorie goal"/>
                  <button onClick={()=>{dispatch({type:"SET_GOAL",profile:s.profile,v:parseInt(goalInput)||2000});setShowGoalEdit(false);}}
                    style={{background:T.accent,color:T.bg,border:"none",borderRadius:10,padding:"0 14px",fontWeight:700,cursor:"pointer",fontSize:13}}>Save</button>
                </div>
              )}
            </Card>

            <Card>
              <Label>This Week — {s.profile}</Label>
              {WEEK_DATES.map((date,i)=>{
                const total=dayTotal(s.calorieLog,date,s.profile);
                const p=total/goal;const isToday=date===TODAY;
                return(
                  <div key={date} onClick={()=>setTrackDate(date)}
                    style={{display:"flex",alignItems:"center",gap:10,padding:"8px 0",borderBottom:`1px solid ${T.border}`,cursor:"pointer",opacity:total===0?0.4:1}}>
                    <div style={{width:48,fontSize:11,color:isToday?T.accent:T.textDim,fontWeight:isToday?700:400}}>{DAYS[i].slice(0,3)}</div>
                    <div style={{flex:1,height:6,background:T.surface2,borderRadius:3,overflow:"hidden"}}>
                      <div style={{height:"100%",width:`${Math.min(p*100,100)}%`,background:p>=1?T.red:p>0.8?T.gold:T.green,borderRadius:3}}/>
                    </div>
                    <div style={{width:60,textAlign:"right",fontSize:12,color:total>0?T.text:T.textDim,fontWeight:total>0?600:400}}>{total>0?`${total} cal`:"—"}</div>
                  </div>
                );
              })}
              <div style={{marginTop:10,display:"flex",justifyContent:"space-between",fontSize:12,color:T.textSoft}}>
                <span>Week total</span>
                <span style={{fontWeight:700,color:T.accent}}>{weekTotal(s.calorieLog,s.profile)} cal</span>
              </div>
            </Card>

            <PhotoEstimator profile={s.profile} onLog={entry=>dispatch({type:"LOG_CALORIES",date:trackDate,profile:s.profile,entry})}/>

            {((s.calorieLog[trackDate]||{})[s.profile]||[]).length>0&&(
              <Card>
                <Label>Logged — {fmtDate(trackDate)}</Label>
                {((s.calorieLog[trackDate]||{})[s.profile]||[]).map(entry=>(
                  <div key={entry.id} style={{display:"flex",alignItems:"center",gap:10,padding:"10px 0",borderBottom:`1px solid ${T.border}`}}>
                    {entry.img&&<img src={entry.img} alt="" style={{width:44,height:44,borderRadius:8,objectFit:"cover",flexShrink:0}}/>}
                    <div style={{flex:1}}>
                      <div style={{fontSize:13,fontWeight:600}}>{entry.name}</div>
                      <div style={{fontSize:11,color:T.textDim}}>{entry.time}</div>
                    </div>
                    <div style={{fontWeight:700,color:T.gold,fontSize:14}}>{entry.calories}</div>
                    <button onClick={()=>dispatch({type:"DEL_LOG",date:trackDate,profile:s.profile,id:entry.id})}
                      style={{background:"none",border:"none",color:T.textDim,cursor:"pointer",fontSize:18,padding:"0 4px"}}>×</button>
                  </div>
                ))}
              </Card>
            )}
          </div>
        )}

        {s.tab==="shopping"&&(
          <div>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
              <Label>Shopping List</Label>
              <button onClick={()=>dispatch({type:"GEN_SHOPPING"})} style={{background:"transparent",border:`1px solid ${T.border}`,color:T.textSoft,borderRadius:10,padding:"5px 12px",fontSize:12,fontWeight:600,cursor:"pointer"}}>↺ Rebuild</button>
            </div>
            {s.shopping.length===0?(
              <Card style={{textAlign:"center",padding:48}}>
                <div style={{fontSize:36,marginBottom:10}}>🛒</div>
                <div style={{color:T.textDim,fontSize:14}}>Go to Planner → "Shopping List"</div>
              </Card>
            ):(
              <Card>
                <div style={{fontSize:12,color:T.textDim,marginBottom:12}}>{s.shopping.filter(i=>i.checked).length} / {s.shopping.length} checked</div>
                {s.shopping.map(item=>(
                  <div key={item.id} onClick={()=>dispatch({type:"TOGGLE_SHOP",id:item.id})}
                    style={{display:"flex",alignItems:"center",gap:12,padding:"13px 0",borderBottom:`1px solid ${T.border}`,cursor:"pointer"}}>
                    <div style={{width:22,height:22,borderRadius:7,border:`1.5px solid ${item.checked?T.green:T.border}`,background:item.checked?T.green:"transparent",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                      {item.checked&&<span style={{color:"#fff",fontSize:12,fontWeight:900}}>✓</span>}
                    </div>
                    <span style={{fontSize:14,color:item.checked?T.textDim:T.text,textDecoration:item.checked?"line-through":"none"}}>{item.name}</span>
                  </div>
                ))}
              </Card>
            )}
          </div>
        )}
      </div>

      <div style={{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:430,background:T.surface,borderTop:`1px solid ${T.border}`,display:"flex",paddingTop:10,paddingBottom:"calc(10px + env(safe-area-inset-bottom,0px))",zIndex:100}}>
        {TABS.map(([t,icon,label])=>(
          <button key={t} onClick={()=>dispatch({type:"TAB",v:t})} style={{flex:1,background:"none",border:"none",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:3,color:s.tab===t?T.accent:T.textDim}}>
            <span style={{fontSize:22}}>{icon}</span>
            <span style={{fontSize:10,fontWeight:600,letterSpacing:0.3}}>{label}</span>
          </button>
        ))}
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
